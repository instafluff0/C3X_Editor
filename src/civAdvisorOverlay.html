<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Civ Advisor Overlay</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    button {
      width: 38px;
      height: 38px;
      padding: 0;
      border: 1px solid #9a8550;
      border-radius: 999px;
      background: linear-gradient(180deg, #e1cf97 0%, #b99653 100%);
      color: #56431d;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(107, 79, 22, 0.24),
        0 0 0 1px rgba(72, 53, 19, 0.26);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1;
    }

    button:hover {
      background: linear-gradient(180deg, #e7d79f 0%, #c09d5f 100%);
    }

    button.has-alerts {
      border-color: #8e7640;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(107, 79, 22, 0.24),
        0 0 0 1px rgba(72, 53, 19, 0.26);
    }

    button.has-unseen-alerts {
      border-color: #a68a45;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(107, 79, 22, 0.24),
        0 0 0 2px rgba(166, 138, 69, 0.24),
        0 0 0 1px rgba(72, 53, 19, 0.26);
    }

    .civ-advisor-button-mark {
      display: block;
      transform: translateY(-0.5px);
    }
  </style>
</head>
<body>
  <button id="open-main" type="button" title="Open Civ Advisor alerts" aria-label="Open Civ Advisor alerts">
    <span class="civ-advisor-button-mark" aria-hidden="true">CA</span>
  </button>
</body>
</html>
